# Only registered, doc-only dependencies are listed here so that
# `Pkg.instantiate()` works from a clean checkout. The unregistered packages
# being documented (NKSearch, Flows, GMRES) are added from local paths by
# docs/make.jl at build time.
[deps]
Documenter = "e30172f5-a6a5-5a46-863b-614d45cd2de4"
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"

[compat]
Documenter = "1"
